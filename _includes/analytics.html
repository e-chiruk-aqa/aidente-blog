<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', '{{ site.google_analytics }}');
  {% if site.google_ads_id %}gtag('config', '{{ site.google_ads_id }}');{% endif %}
</script>

{% if site.google_ads_conversion_label %}
<!-- App Store click conversion tracking -->
<script>
(function() {
  function trackAppStoreClick(link) {
    if (typeof gtag !== 'function') return;
    gtag('event', 'conversion', {
      'send_to': '{{ site.google_ads_conversion_label }}'
    });
    gtag('event', 'app_store_click', {
      'event_category': 'engagement',
      'event_label': link.href,
      'link_location': window.location.pathname
    });
  }

  function bind() {
    var links = document.querySelectorAll('a[href*="apps.apple.com"]');
    for (var i = 0; i < links.length; i++) {
      links[i].addEventListener('click', function() {
        trackAppStoreClick(this);
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bind);
  } else {
    bind();
  }
})();
</script>
{% endif %}
